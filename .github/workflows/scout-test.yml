name: scout-test

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npm test
